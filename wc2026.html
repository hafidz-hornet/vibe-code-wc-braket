<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 - Road to Final</title>
    <style>
        :root {
            --bg-color: #0f121d;
            --card-bg: #161b2c;
            --border-color: #2a3454;
            --accent-green: #00ffaa;
            --text-color: #ffffff;
            --text-muted: #8b9bb4;
            --input-bg: #1e253f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 4px solid var(--accent-green);
            padding-bottom: 15px;
        }

        header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 255, 170, 0.3);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 5px;
        }

        /* Bracket Layout Container */
        .bracket-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            gap: 20px;
        }

        .bracket-column {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 850px;
            flex: 1;
        }

        /* Centerpiece Trophy Section */
        .center-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1.2;
            height: 850px;
            position: relative;
        }

        .trophy-placeholder {
            font-size: 5rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px gold);
        }

        .final-title {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-green);
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        /* Match Card Styling */
        .match-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 12px;
            width: 100%;
            max-width: 245px;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .match-card:hover {
            border-color: var(--accent-green);
            transform: translateY(-2px);
        }

        .match-header {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }

        .team-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin: 6px 0;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1rem;
        }

        .flag {
            font-size: 1.15rem;
        }

        .score-box {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }

        .score-input {
            width: 36px;
            height: 30px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            text-align: center;
            font-weight: bold;
            border-radius: 4px;
            font-size: 1rem;
        }

        .score-input:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .penalty-input {
            width: 32px;
            height: 26px;
            background-color: #bd2130;
            border: 1px solid #dc3545;
            color: #fff;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 4px;
            display: none;
        }

        .penalty-input.visible {
            display: block;
        }

        .center-stage .match-card {
            max-width: 270px;
            margin: 15px 0;
        }

        /* Mobile Responsive View Styling */
        @media (max-width: 900px) {
            .bracket-container {
                flex-direction: column;
                height: auto;
                gap: 40px;
            }

            .bracket-column,
            .center-stage {
                height: auto;
                width: 100%;
            }

            .bracket-column::before {
                content: attr(data-round);
                display: block;
                font-size: 1.2rem;
                font-weight: bold;
                color: var(--accent-green);
                border-left: 4px solid var(--accent-green);
                padding-left: 8px;
                margin-bottom: 15px;
                text-transform: uppercase;
            }

            .match-card {
                max-width: 100%;
                margin-bottom: 12px;
            }
        }
    </style>
</head>

<body>

            M90: { "id": "M90", "round": "r16-left", "date": "7-5 01:00", "home": "CAN", "away": "MAR", "homeScore": "", "awayScore": "", "nextMatch": "M97", "side": "away" },
            M93: { "id": "M93", "round": "r16-left", "date": "7-7 03:00", "home": "POR", "away": "ESP", "homeScore": "", "awayScore": "", "nextMatch": "M98", "side": "home" },

            M96: { "id": "M96", "round": "r16-right", "date": "7-8 04:00", "home": "SUI", "away": null, "homeScore": "", "awayScore": "", "nextMatch": "M100", "side": "away" },
            M99: { "id": "M99", "round": "qf-right", "date": "7-12 05:00", "home": null, "away": null, "homeScore": "", "awayScore": "", "nextMatch": "M102", "side": "home" },
            M100: { "id": "M100", "round": "qf-right", "date": "7-12 09:00", "home": null, "away": null, "homeScore": "", "awayScore": "", "nextMatch": "M102", "side": "away" },
            M102: { "id": "M102", "round": "sf-right", "date": "7-16 03:00", "home": null, "away": null, "homeScore": "", "awayScore": "", "nextMatch": "M104", "side": "away", "lossNextMatch": "M103", "lossSide": "away" },
            M104: { "id": "M104", "round": "finals", "date": "7-20 03:00", "home": null, "away": null, "homeScore": "", "awayScore": "", "label": "Final" },
            M103: { "id": "M103", "round": "finals", "date": "7-19 05:00", "home": null, "away": null, "homeScore": "", "awayScore": "", "label": "3rd" }
        };

        function renderBracket() {
            // Clear content columns
            document.querySelectorAll('.bracket-column, #col-finals').forEach(el => el.innerHTML = '');

            Object.values(matches).forEach(match => {
                const card = document.createElement('div');
                card.className = 'match-card';
                card.id = `card-${match.id}`;

                let headerText = match.label ? `${match.id} • ${match.label}` : match.id;

                // Show penalties helper display check
                const isTie = match.homeScore !== "" && match.awayScore !== "" && parseInt(match.homeScore) === parseInt(match.awayScore);
                const penClass = isTie ? 'visible' : '';

                const homeTeam = teams[match.home] || { name: `Winner ${match.id}`, code: match.home || "TBD", flag: "🏳️" };
                const awayTeam = teams[match.away] || { name: `Winner ${match.id}`, code: match.away || "TBD", flag: "🏳️" };

                card.innerHTML = `
                    <div class="match-header">
                        <span style="font-weight: 600; color: #fff;">${headerText}</span>
                        <span style="color: var(--accent-green); font-size: 0.76rem; font-weight: bold; white-space: nowrap;">${match.date}</span>
                    </div>
                    <div class="team-row">
                        <div class="team-info">
                            <span class="flag">${homeTeam.flag}</span>
                            <span>${homeTeam.code}</span>
                        </div>
                        <div class="score-box">
                            <input type="number" class="penalty-input ${penClass}" id="pen-home-${match.id}" value="${match.homePen || ''}" oninput="updateScore('${match.id}', 'homePen', this.value)">
                            <input type="number" class="score-input" value="${match.homeScore}" oninput="updateScore('${match.id}', 'homeScore', this.value)">
                        </div>
                    </div>
                    <div class="team-row">
                        <div class="team-info">
                            <span class="flag">${awayTeam.flag}</span>
                            <span>${awayTeam.code}</span>
                        </div>
                        <div class="score-box">
                            <input type="number" class="penalty-input ${penClass}" id="pen-away-${match.id}" value="${match.awayPen || ''}" oninput="updateScore('${match.id}', 'awayPen', this.value)">
                            <input type="number" class="score-input" value="${match.awayScore}" oninput="updateScore('${match.id}', 'awayScore', this.value)">
                        </div>
                    </div>
                `;

                // Append card to correct container block
                if (match.round === 'finals') {
                    document.getElementById('col-finals').appendChild(card);
                } else {
                    document.getElementById(`col-${match.round}`).appendChild(card);
                }
            });
        }

        function updateScore(matchId, key, value) {
            const match = matches[matchId];
            if (value === "") {
                match[key] = "";
            } else {
                match[key] = parseInt(value);
            }

            // Recalculate winners and pass along the bracket branches
            evaluateMatchOutcome(matchId);
            renderBracket();
        }

        function evaluateMatchOutcome(matchId) {
            const match = matches[matchId];
            let winner = null;
            let loser = null;

            const hs = match.homeScore;
            const as = match.awayScore;

            if (hs !== "" && as !== "") {
                if (hs > as) {
                    winner = match.home;
                    loser = match.away;
                } else if (as > hs) {
                    winner = match.away;
                    loser = match.home;
                } else {
                    // It's a tie, look into penalty shootouts fields
                    const hp = match.homePen;
                    const ap = match.awayPen;
                    if (hp !== "" && ap !== "") {
                        if (hp > ap) { winner = match.home; loser = match.away; }
                        if (ap > hp) { winner = match.away; loser = match.home; }
                    }
                }
            }

            // Forward to next stage matches if designated
            if (match.nextMatch) {
                const next = matches[match.nextMatch];
                if (match.side === 'home') next.home = winner;
                if (match.side === 'away') next.away = winner;
                evaluateMatchOutcome(match.nextMatch);
            }

            // Forward to third-place play-off match rules
            if (match.lossNextMatch) {
                const lossNext = matches[match.lossNextMatch];
                if (match.lossSide === 'home') lossNext.home = loser;
                if (match.lossSide === 'away') lossNext.away = loser;
                evaluateMatchOutcome(match.lossNextMatch);
            }
        }

        // Initial setup execution
        Object.keys(matches).forEach(matchId => evaluateMatchOutcome(matchId));
        renderBracket();
    </script>
</body>
